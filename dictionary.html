<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamus Bahasa Daerah - Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/dictionary.css" />
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="back-btn" aria-label="Kembali ke pilihan bahasa">←</a>
            <div class="logo-mark" id="langEmoji">🌍</div>
            <div class="header-text">
                <h1>Kamus <span id="langName">Bahasa Daerah</span></h1>
                <p id="langRegion">Indonesia</p>
            </div>
            <div class="header-stats">
                <div class="stat-pill"><strong id="totalWords">0</strong> entri</div>
            </div>
        </div>
    </header>

    <!-- HERO SEARCH -->
    <div class="hero">
        <div class="hero-inner">
            <p class="hero-tagline" id="heroTagline">Telusuri kosakata <strong>Bahasa Daerah</strong></p>
            <div class="search-box">
                <input
                    type="search"
                    id="searchInput"
                    class="search-input"
                    placeholder="Cari kata atau arti dalam bahasa Indonesia…"
                    autocomplete="off"
                    spellcheck="false"
                />
                <span class="search-icon">🔍</span>
            </div>
            <div class="search-hint">Tekan <kbd>Esc</kbd> untuk bersihkan · klik kartu untuk detail</div>
        </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
        <span class="filter-label">Kategori</span>
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="nomina">Nomina</button>
        <button class="filter-btn" data-filter="verba">Verba</button>
        <button class="filter-btn" data-filter="adjektiva">Adjektiva</button>
        <button class="filter-btn" data-filter="adverbia">Adverbia</button>
    </div>

    <!-- ALPHABET BAR -->
    <div class="alphabet-bar" id="alphabetBar"></div>

    <!-- MAIN -->
    <div class="main">
        <div class="results-info" id="resultsInfo"></div>
        <div id="dictContainer"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true">
            <button class="modal-close" id="modalClose" aria-label="Tutup">✕</button>
            <div class="modal-word" id="mWord"></div>
            <div class="modal-phonetic" id="mPhonetic"></div>
            <div class="entry-meta" id="mMeta"></div>
            <div class="modal-divider"></div>
            <div class="modal-section-title">Definisi</div>
            <div class="modal-definition" id="mDef"></div>
            <div class="modal-source" id="mSource"></div>
            <div class="modal-share">
                <button class="btn-copy" id="btnCopy">Salin Kata</button>
            </div>
        </div>
    </div>

    <!-- SCROLL TOP -->
    <button id="scrollTop" aria-label="Ke atas">↑</button>

    <footer>
        <div id="footerText">Kamus Bahasa Daerah Digital · Dibuat Oleh https://github.com/fintisalsabila</div>
    </footer>

    <script src="js/dictionary.js"></script>
</body>
</html>
